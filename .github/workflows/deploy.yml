
name: Deploy

on: 
  push:
    branches: [main]
    
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.22
      - run: npm ci
      - run: npm run build
      - run: tar -czf dist.tar.gz appspec.yml scripts/ dist/
      - uses: actions/upload-artifact@v4
        with: 
          name: deployment-bundle
          path: dist.tar.gz

  deploy:
    permissions: 
      id-token: write
      contents: read
    runs-on: ubuntu-latest
    needs: build
    steps: 
      - uses: actions/download-artifact@v4
        with:
          name: deployment-bundle
          path: .
      - name: Print GitHub context
        run: |
          echo "repository=${{ github.repository }}"
          echo "ref=${{ github.ref }}"
          echo "ref_name=${{ github.ref_name }}"
          echo "event=${{ github.event_name }}"
          echo "actor=${{ github.actor }}"

      - name: Show OIDC token claims
        uses: actions/github-script@v7
        with:
          script: |
            const core = require('@actions/core');

            const token = await core.getIDToken('sts.amazonaws.com');

            const payload = JSON.parse(
              Buffer.from(token.split('.')[1], 'base64url').toString()
            );

            console.log(JSON.stringify(payload, null, 2));
            
      - uses: aws-actions/configure-aws-credentials@v4
        with: 
          aws-region: us-west-2
          role-to-assume: arn:aws:iam::488923400120:role/jsfaculty-new-test
      - run: aws s3 cp dist.tar.gz s3://jsfaculty.cicd.test.bucket/production/dist.tar.gz
      - run: |
          aws deploy create-deployment \
            --application-name cicd_test_deployment \
            --deployment-group-name cicd_deployment \
            --s3-location bucket=jsfaculty.cicd.test.bucket,bundleType=tgz,key=production/dist.tar.gz

name: Deploy

on: 
  push:
    branches: [main]
    
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.22
      - run: npm ci
      - run: npm run build
      - run: tar -czf dist.tar.gz appspec.yml scripts/ dist/
      - uses: actions/upload-artifact@v4
        with: 
          name: deployment-bundle
          path: dist.tar.gz

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps: 
      - uses: actions/download-artifact@v4
        with:
          name: deployment-bundle
          path: .
      - run: ls -la
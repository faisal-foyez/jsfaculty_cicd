version: 0.0
os: linux

files:
  - source: .
    destination: /var/www/myapp
    file_exists_behavior: OVERWRITE

permissions:
  - object: /var/www/myapp
    pattern: "**"
    owner: www-data
    group: www-data
    mode: 755

hooks:
  ApplicationStop:
    - location: scripts/stop.sh
      timeout: 60
      runas: root

  AfterInstall:
    - location: scripts/install.sh
      timeout: 300
      runas: root

  ApplicationStart:
    - location: scripts/start.sh
      timeout: 120
      runas: root